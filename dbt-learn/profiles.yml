my_project:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres        # matches service name above
      port: 5432
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: bronze
      threads: 1