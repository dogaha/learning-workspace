version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: 'true'

      CLUSTER_ID: '1L6g7nGhU-eAkfL--X25wo' # random string
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker, controller # roles of node, broker store and server, controller designate
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # which nodes are controllers
      # you can add backup controlles by adding ",#@kafka:port"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # basically a backup, 1 = only 1 copy, defualt 3

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092, CONTROLLER://0.0.0.0:9093 
      # where producers and consumers connect, where controllers/nodes connect
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs # local persistant data
    
    volumes:
      - kafka_kraft:/var/lib/kafka/data
volumes:
  kafka_kraft: